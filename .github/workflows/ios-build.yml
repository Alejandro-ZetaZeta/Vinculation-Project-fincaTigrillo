name: iOS Shell Build (Debug Verification)

# Verification-only: confirms the iOS shell scaffolds, CocoaPods resolve,
# and xcodebuild compiles against iphonesimulator. NO signing, NO archive,
# NO TestFlight upload — the ULEAM IT Matrix Team handles that on their
# institutional Mac with their own Apple Developer account.
#
# This workflow is intentionally read-only against the Apple ecosystem.
# No .p12, no .p8, no .mobileprovision, no App Store Connect secrets.

on:
  workflow_dispatch:
  push:
    tags:
      - "mobile-v*"
    branches:
      - main

permissions:
  contents: read
  packages: read
  actions: write
concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios-shell:
    name: Scaffold + xcodebuild (iphonesimulator, Debug)
    runs-on: macos-latest
    timeout-minutes: 30

    env:
      # Override per-environment via GitHub Actions Variables
      # (repo or org level: Settings -> Secrets and variables -> Actions -> Variables).
      # Falls back to the public Vercel deployment for open-source / student use.
      FINCA_TIGRILLO_PROD_URL: ${{ vars.FINCA_TIGRILLO_PROD_URL || 'https://fincatigrillo.vercel.app' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"

      - name: Install dependencies (npm ci)
        working-directory: ios-shell
        run: npm ci

      - name: Create Web Placeholder (Crucial for Capacitor)
        # Forzamos la existencia de la carpeta web para que Capacitor no falle al andamiar
        working-directory: ios-shell
        run: |
          mkdir -p www
          echo '<!DOCTYPE html><html><head><title>Finca Tigrillo</title></head><body></body></html>' > www/index.html

      - name: Scaffold ios/ from scratch (clean + verify)
        # Force a clean scaffold every run:
        # 1. Remove any partial/corrupt ios/ left from a prior failed run.
        # 2. `cap add ios` is non-interactive for new platforms (no prompt to skip).
        # 3. Verify the workspace actually exists; fail with tree dump if not.
        working-directory: ios-shell
        run: |
          set -e
          echo "=== Removing any existing ios/ for clean scaffold ==="
          rm -rf ios
          echo "=== Running npx cap add ios ==="
          npx cap add ios
          echo "=== Verifying ios/App/App.xcworkspace exists ==="
          if [ ! -d "ios/App/App.xcworkspace" ]; then
            echo "::error::cap add ios did not create ios/App/App.xcworkspace"
            echo "=== ios/ tree (maxdepth 4) ==="
            find ios -maxdepth 4 -print 2>/dev/null || true
            echo "=== ios-shell/ listing ==="
            ls -la
            exit 1
          fi
          echo "OK: ios/App/App.xcworkspace present"

      - name: Sync & Build CocoaPods natively via Capacitor
        # `cap sync` copies the latest config + plugins into the Xcode project
        # AND runs `pod install` internally. No manual `pod install` step needed.
        working-directory: ios-shell
        run: npx cap sync

      - name: xcodebuild smoke test (Debug, iphonesimulator, unsigned)
        working-directory: ios-shell
        run: |
          set -o pipefail
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ios-shell-build-${{ github.run_id }}
          path: ios-shell/build/Build/Products/Debug-iphonesimulator/
          if-no-files-found: error
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          echo "### iOS Shell Verification" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Runner: macos-latest" >> $GITHUB_STEP_SUMMARY
          echo "- SDK: iphonesimulator (Debug, unsigned)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Signing, archiving, and App Store Connect upload are performed by ULEAM IT Matrix Team on an institutional Mac." >> $GITHUB_STEP_SUMMARY
